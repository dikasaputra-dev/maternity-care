services:
  frontend:
    container_name: maternity-care-frontend
    build:
      context: .
      target: development
    ports:
      - '5173:5173'
    volumes:
      - .:/app
      - frontend-node-modules:/app/node_modules
    environment:
      CHOKIDAR_USEPOLLING: 'true'
    init: true

volumes:
  frontend-node-modules:
